<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Calc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="card p-4 rounded-4 mx-auto w-50">

            <!-- Prima Fila -->
            <input type="text" class="form-control shadow-sm mb-4 rounded-4 calculator-screen" id="myInput"
                value="0" readonly>

            <div class="row g-2">
                <!-- Seconda Fila -->
                <div class="col-6">
                    <button class="btn btn-danger w-100 rounded-4 calcBtn" id="btnC" value="C">C</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary w-100 rounded-4 calcOp" id="btnDiv" value="/">÷</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary w-100 rounded-4 calcOp" id="btnMolti" value="*">×</button>
                </div>

                <!-- Terza Fila -->
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn7" value="7">7</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn8" value="8">8</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn9" value="9">9</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary w-100 rounded-4 calcOp" id="btnSub" value="-">-</button>
                </div>

                <!-- Quarta Fila -->
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn4" value="4">4</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn5" value="5">5</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn6" value="6">6</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-secondary w-100 rounded-4 calcOp" id="btnAdd" value="+">+</button>
                </div>

                <!-- Quinta Fila -->
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn1" value="1">1</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn2" value="2">2</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn3" value="3">3</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-primary w-100 rounded-4 calcBtn" id="btnEqual" value="=">=</button>
                </div>

                <!-- Sesta Fila -->
                <div class="col-9">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcNum" id="btn0" value="0">0</button>
                </div>
                <div class="col-3">
                    <button class="btn btn-light shadow-sm w-100 rounded-4 calcBtn" id="btnPoint" value=".">.</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/script.js"></script>
</body>

</html>
